name: Deploy Pharm Bot

on:
  push:
    branches: [ main ]
  workflow_dispatch:          # позволяет запускать вручную

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pharm-bot:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/pharm-bot:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd ~/pharm

            echo "Pulling new image..."
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/pharm-bot:latest

            echo "Stopping old container..."
            docker stop pharm-bot || true

            echo "Removing old container..."
            docker rm pharm-bot || true

            echo "Starting new container..."
            docker run -d \
              --name pharm-bot \
              --restart unless-stopped \
              -e BOT_TOKEN="${{ secrets.PHARM_BOT_TOKEN }}" \
              -v $(pwd)/service_account.json:/app/service_account.json \
              -v $(pwd)/utils:/app/utils \
              ${{ secrets.DOCKERHUB_USERNAME }}/pharm-bot:latest

            echo "Cleaning up..."
            docker system prune -f
name: Deploy Pharm Bot

on:
  push:
    branches: [ main ]
    paths:
      - 'pharm/**'
      - '.github/workflows/deploy-pharm.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pharm-bot:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/pharm-bot:${{ github.sha }}

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/pharm
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/pharm-bot:latest
            docker stop pharm-bot || true
            docker rm pharm-bot || true
            docker run -d \
              --name pharm-bot \
              --restart unless-stopped \
              -e BOT_TOKEN="${{ secrets.PHARM_BOT_TOKEN }}" \
              -v $(pwd)/service_account.json:/app/service_account.json \
              -v $(pwd)/utils:/app/utils \
              ${{ secrets.DOCKERHUB_USERNAME }}/pharm-bot:latest
            docker system prune -f